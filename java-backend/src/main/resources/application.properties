# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:3001}

# ─── Database Configuration ─────────────────────────────────────────────────
# OPTION 1: MySQL (uncomment and fill in to use MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/algoviz?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=YOUR_MYSQL_USERNAME
# spring.datasource.password=YOUR_MYSQL_PASSWORD
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# OPTION 2: H2 in-memory database (default — works out of the box, no setup needed)
spring.datasource.url=jdbc:h2:file:./data/algoviz;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# ─── JPA ────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
