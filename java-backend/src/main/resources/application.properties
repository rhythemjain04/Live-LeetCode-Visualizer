# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:3001}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}

# ─── Database Configuration ─────────────────────────────────────────────────
# Production should set the SPRING_DATASOURCE_* and SPRING_JPA_DATABASE_PLATFORM
# variables to a managed Postgres database. H2 remains the local fallback.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/algoviz;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# ─── JPA ────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
